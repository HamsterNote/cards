name: PR CI (tests & build)

on:
  pull_request:
    branches:
      - main
      - dev

permissions:
  contents: read

concurrency:
  group: pr-${{ github.event.pull_request.head.sha }}
  cancel-in-progress: true

jobs:
  pr-checks:
    name: Test and Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Install dependencies
        run: |
          corepack enable
          yarn --version
          yarn install --frozen-lockfile

      - name: Run lint
        run: |
          yarn lint

      - name: Run format check
        run: |
          yarn format:check

      - name: Run typecheck
        run: |
          yarn typecheck

      - name: Build
        run: |
          yarn build

      - name: Install Playwright browsers
        run: |
          npx playwright install --with-deps chromium

      - name: Run e2e tests
        run: |
          yarn test:e2e

      - name: Verify package contents
        run: |
          yarn pack:check